<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Inbursa — Painel Gerador de Quitação</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">Banco <span>Inbursa</span></div>
      <div class="status-badge">Painel de Emissões</div>
    </header>

    <main class="app-main">
      <section class="config-panel">
        <!-- CLIENT SECTION -->
        <div class="section-card">
          <h3>Dados do Cliente</h3>
          <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" id="clientName" placeholder="Ex: Egildo Oliveira Gonçalves">
          </div>
          <div class="input-grid">
            <div class="input-group">
              <label>CPF</label>
              <input type="text" id="clientCPF" placeholder="000.000.000-00">
            </div>
            <div class="input-group">
              <label>Benefício (NB)</label>
              <input type="text" id="clientNB" placeholder="000.000.000-0 - UF">
            </div>
          </div>
        </div>

        <!-- CONTRACTS SECTION -->
        <div class="section-card">
          <div class="flex-between">
            <h3>Contratos do Acordo</h3>
            <button id="addContract" class="btn-secondary">+ Adicionar</button>
          </div>
          <div id="contractList" class="contract-list">
            <!-- Dynamic contract rows injected here -->
          </div>
        </div>

        <!-- STRATEGY SECTION -->
        <div class="section-card">
          <h3>Configurações de Geração</h3>
          <div class="input-group flex-row">
            <input type="checkbox" id="isSigned" checked>
            <label for="isSigned" style="font-size: 0.8rem; cursor: pointer;">Incluir Assinatura Eletrônica Inbursa</label>
          </div>
          <button id="generateBtn" class="btn-primary" style="margin-top: 0.5rem;">Gerar Termo de Quitação</button>
        </div>
      </section>

      <!-- PREVIEW PANEL -->
      <section class="preview-panel">
        <div class="preview-header">
          <h3>Visualização do Termo (Duas Páginas A4)</h3>
          <button id="printBtn" class="btn-outline">Imprimir PDF / A4</button>
        </div>
        <div id="previewFrame" class="preview-frame">
          <div class="empty-state">Preencha os dados à esquerda e clique em "Gerar Termo de Quitação"</div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
